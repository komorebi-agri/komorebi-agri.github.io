<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピーマン病気判定ナビ</title>
    <style>
        body { font-family: sans-serif; background-color: #f1f8e9; color: #333; margin: 0; padding: 15px; }
        .container { max-width: 600px; background: white; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #388e3c; font-size: 1.5rem; }
        .section { margin-bottom: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 15px; }
        .section-title { font-weight: bold; color: #388e3c; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 5px; background: #fafafa; }
        button { width: 100%; padding: 12px; background: #388e3c; color: white; border: none; font-size: 1.1rem; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #2e7d32; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .disease-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
        .info-block { margin-top: 8px; background: #f9f9f9; padding: 10px; border-left: 4px solid #388e3c; }
        .info-title { font-weight: bold; color: #555; }
        .warn-msg { color: #d84315; font-weight: bold; padding: 10px; background: #fff9c4; border: 1px solid #fbc02d; margin-bottom: 10px; border-radius: 4px; }
        .search-btn { display: inline-block; width: 100%; text-align: center; padding: 12px; background: #ef6c00; color: white; font-weight: bold; border-radius: 5px; text-decoration: none; margin-top: 15px; box-sizing: border-box; }
        .search-btn:hover { background: #e65100; }
    </style>
</head>
<body>

<div class="container">
    <h1>🫑 ピーマン病気判定ナビ</h1>
    <p style="font-size: 0.9rem; text-align: center; color: #666;">気になる部位と症状を1つ選んでください</p>

    <div class="section">
        <span class="section-title">【葉】の症状</span>
        <select id="symptom-leaf" onchange="clearOthers('symptom-leaf')">
            <option value="">-- 選択してください --</option>
            <option value="斑点病">褐色〜黒色の円形斑点、後に中心部が白っぽくなる</option>
            <option value="モザイク病">葉に濃淡の模様、新葉の萎縮や奇形</option>
            <option value="うどんこ病">葉全体に白い粉をまぶしたようなかび</option>
        </select>
    </div>

    <div class="section">
        <span class="section-title">【実】の症状</span>
        <select id="symptom-fruit" onchange="clearOthers('symptom-fruit')">
            <option value="">-- 選択してください --</option>
            <option value="灰色かび病">果実やヘタに灰色のかびが生え、腐敗する</option>
            <option value="疫病">果実に暗緑色の水浸状斑点、急速に腐敗</option>
            <option value="炭疽病（実）">果実に円形のくぼんだ病斑、サケ色の粘液が出る</option>
            <option value="尻腐れ症">果実のお尻が黒く変色してへこむ【生理障害】</option>
            <option value="着果不良">花が落ちる、実がいびつになる【生理障害】</option>
        </select>
    </div>

    <div class="section">
        <span class="section-title">【茎・根】の症状</span>
        <select id="symptom-stem" onchange="clearOthers('symptom-stem')">
            <option value="">-- 選択してください --</option>
            <option value="青枯病">青いまま急激に萎れる、茎の中が褐変</option>
            <option value="疫病">地際の茎が水浸状に黒変し、株が倒れる</option>
            <option value="白絹病">地際の茎に白い菌糸がまとい、茶色い粒（菌核）ができる</option>
        </select>
    </div>

    <button onclick="diagnose()">判定する</button>

    <div id="result"></div>
</div>

<script>
function clearOthers(selectedId) {
    ['symptom-leaf', 'symptom-fruit', 'symptom-stem'].forEach(id => {
        if (id !== selectedId) document.getElementById(id).value = "";
    });
}

const diseaseDatabase = {
    "斑点病": { type: "糸状菌（かび）", symptom: "葉に小さな褐色〜黒色の斑点が出現し、進行すると中心部が灰白色になる。", action: "雨による泥跳ねで感染。マルチを張り、密植を避けて風通しを確保。", chemical: "ダコニール1000、ジーファインなど" },
    "モザイク病": { type: "ウイルス", symptom: "葉に濃淡のモザイク模様が出たり、新葉が萎縮して奇形になる。", action: "アブラムシが媒介。防虫ネットで遮断し、発病株は早期発見して処分。", chemical: "（殺虫剤で媒介昆虫を防除）" },
    "うどんこ病": { type: "糸状菌（かび）", symptom: "葉全体に白い粉をまぶしたようなかびが発生する。", action: "乾燥気味で発生しやすい。風通しを良くする。", chemical: "カリグリーン、パンチョTFなど" },
    "灰色かび病": { type: "糸状菌（かび）", symptom: "果実やヘタの部分に灰色のかびが生え、軟らかく腐る。", action: "花がらをこまめに取り除き、多湿を避ける。", chemical: "ファンタジスタ、セイビアーなど" },
    "疫病": { type: "卵菌", symptom: "果実や茎が暗緑色に水浸状になり、急速に腐敗する。", action: "排水対策が最重要。高畝にする。", chemical: "ランマンフロアブルなど" },
    "炭疽病（実）": { type: "糸状菌（かび）", symptom: "果実に円形のくぼんだ病斑ができ、雨天時にはサケ色の粘液が出る。", action: "雨よけ栽培が有効。泥跳ねを防ぐ。", chemical: "トップジンM、ダコニール1000など" },
    "青枯病": { type: "細菌", symptom: "青いまま急激に萎れる。茎の切断面が褐変し、菌が滲み出る。", action: "土壌伝染。高温多湿で多発。抵抗性台木を利用。", chemical: "（防除困難。圃場の排水対策と連作回避）" },
    "白絹病": { type: "糸状菌（かび）", symptom: "地際の茎に白い糸のような菌糸がまとわりつき、茶色い粒（菌核）ができる。", action: "高温多湿で発生。発病株は土ごと掘り取り処分。", chemical: "（登録薬剤が限られるため、発生前の土壌管理が重要）" },
    "尻腐れ症": { type: "生理障害", symptom: "果実のお尻が黒く変色してへこむ。カルシウム欠乏や水ストレスが原因。", action: "水やりを一定に保つ。マルチで乾燥を防ぐ。", chemical: "農薬不要（カルシウム剤の葉面散布）" },
    "着果不良": { type: "生理障害", symptom: "花がポロポロ落ちる、あるいは実がいびつ（石ピーマン等）。環境変化によるストレス。", action: "高温・乾燥や肥料過多を避ける。環境を安定させる。", chemical: "農薬不要" }
};

function diagnose() {
    const leaf = document.getElementById('symptom-leaf').value;
    const fruit = document.getElementById('symptom-fruit').value;
    const stem = document.getElementById('symptom-stem').value;
    const selectedDisease = leaf || fruit || stem;
    const resultDiv = document.getElementById('result');

    if (!selectedDisease) {
        resultDiv.style.display = "block";
        resultDiv.style.backgroundColor = "#ffebee";
        resultDiv.innerHTML = "<p style='color:#c62828; text-align:center; font-weight:bold;'>症状をどれか1つ選択してください！</p>";
        return;
    }

    const data = diseaseDatabase[selectedDisease];
    const isPhysio = data.type === "生理障害";
    const searchUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent('ピーマン ' + selectedDisease)}`;

    resultDiv.style.display = "block";
    resultDiv.style.backgroundColor = isPhysio ? "#fff9c4" : "#e8f5e9";
    resultDiv.innerHTML = `
        <div class="disease-name" style="color:${isPhysio ? '#d84315' : '#1b5e20'}">
            ${isPhysio ? '⚠️ 生理障害' : '🎯 推測される病気'}：${selectedDisease}
        </div>
        ${isPhysio ? '<div class="warn-msg">農薬は効きません！水管理や環境改善を優先してください。</div>' : ''}
        <div class="info-block"><span class="info-title">📋 症状の特徴:</span><p style="margin:5px 0 0 0; font-size:0.95rem;">${data.symptom}</p></div>
        <div class="info-block"><span class="info-title">🛠️ 現場での対策:</span><p style="margin:5px 0 0 0; font-size:0.95rem;">${data.action}</p></div>
        <div class="info-block"><span class="info-title">💊 提案される対応:</span><p style="margin:5px 0 0 0; font-size:0.95rem; color:#b71c1c; font-weight:bold;">${data.chemical}</p></div>
        <a href="${searchUrl}" target="_blank" class="search-btn">📸 Googleで「ピーマン ${selectedDisease}」の症例写真を見る</a>
    `;
}
</script>
</body>
</html>
